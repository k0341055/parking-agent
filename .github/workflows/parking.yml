name: Parking Availability Check

on:
  schedule:
    # GitHub Actions cron 最短間隔為 5 分鐘
    # 解法：每次 workflow 內部執行 5 輪，每輪間隔 ~60 秒 → 實質每分鐘偵測一次
    - cron: '*/5 * * * *'
  workflow_dispatch:   # 允許手動觸發

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 8   # 5 輪 × ~60s + 啟動時間，設 8 分鐘保險

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-playwright

      - name: Install dependencies
        run: |
          pip install playwright requests
          playwright install chromium --with-deps

      - name: Run parking agent (5 rounds × ~1 min)
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          GMAIL_SENDER: ${{ secrets.GMAIL_SENDER }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          GMAIL_RECIPIENT: ${{ secrets.GMAIL_RECIPIENT }}
          CHECK_ROUNDS: "5"
        run: python parking_book/parking_agent_v2.py
